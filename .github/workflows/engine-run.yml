name: AVOT Engine Runner

on:
  workflow_run:
    workflows: ["Archivist Ingest"]
    types:
      - completed

permissions:
  contents: write

jobs:
  run-engine:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Archivist repo
        uses: actions/checkout@v4

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.CODEX_APP_ID }}
          private-key: ${{ secrets.CODEX_APP_PRIVATE_KEY }}
          owner: sovereign-codex
          repositories: |
            AVOT-TRACE
            Codex-control-center

      - name: Emit trace (engine start)
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          TRACE="engine_${GITHUB_RUN_ID}"

          curl -s -X POST https://api.github.com/repos/sovereign-codex/AVOT-TRACE/dispatches \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -d "{
              \"event_type\": \"trace_log\",
              \"client_payload\": {
                \"trace_id\": \"$TRACE\",
                \"repo\": \"${GITHUB_REPOSITORY}\",
                \"workflow\": \"engine-runner\",
                \"status\": \"started\"
              }
            }"

      - name: Ensure normalized output directory
        run: |
          mkdir -p outputs/signals-normalized

      - name: Pull latest changes
        run: |
          git pull origin main --rebase || echo "No remote changes"

      - name: Normalize signals and handoff
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          echo "=== ENGINE NORMALIZATION START ==="
          shopt -s nullglob

          for file in processed/signals/*; do
            [ -f "$file" ] || continue

            case "$file" in
              *.json|*.JSON) ;;
              *) continue ;;
            esac

            filename=$(basename "$file")
            base="${filename%.*}"

            TYPE=$(jq -r '.type // "unknown"' "$file")
            PRIORITY=$(jq -r '.priority // "low"' "$file")

            TRACE=$(jq -r '.trace_id // empty' "$file")
            if [ -z "$TRACE" ]; then
              TRACE="trc_${base}"
            fi

            NORMALIZED_FILE="outputs/signals-normalized/${base}.json"

            jq -n \
              --arg trace_id "$TRACE" \
              --arg type "$TYPE" \
              --arg priority "$PRIORITY" \
              --arg source_repo "${GITHUB_REPOSITORY}" \
              --arg source_file "$filename" \
              '{
                trace_id: $trace_id,
                type: $type,
                priority: $priority,
                source: {
                  repo: $source_repo,
                  file: $source_file
                }
              }' > "$NORMALIZED_FILE"

            echo "Normalized $filename → $NORMALIZED_FILE"

            # 🔥 TRACE: normalized
            curl -s -X POST https://api.github.com/repos/sovereign-codex/AVOT-TRACE/dispatches \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -d "{
                \"event_type\": \"trace_log\",
                \"client_payload\": {
                  \"trace_id\": \"$TRACE\",
                  \"repo\": \"${GITHUB_REPOSITORY}\",
                  \"workflow\": \"engine-runner\",
                  \"status\": \"normalized\"
                }
              }"

            # 🚀 HANDOFF TO CONTROL CENTER (NO ROUTING DECISION)
            RESPONSE=$(curl -s -o response.txt -w "%{http_code}" -X POST \
              https://api.github.com/repos/sovereign-codex/Codex-control-center/dispatches \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -d "{
                \"event_type\": \"engine_signal\",
                \"client_payload\": {
                  \"trace_id\": \"$TRACE\",
                  \"type\": \"$TYPE\",
                  \"priority\": \"$PRIORITY\",
                  \"source_repo\": \"${GITHUB_REPOSITORY}\",
                  \"file\": \"$filename\"
                }
              }")

            echo "Dispatch response: $RESPONSE"
            cat response.txt || true

            STATUS="handoff_sent"
            if [ "$RESPONSE" != "204" ]; then
              STATUS="handoff_failed"
            fi

            # 🔥 TRACE: handoff result
            curl -s -X POST https://api.github.com/repos/sovereign-codex/AVOT-TRACE/dispatches \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -d "{
                \"event_type\": \"trace_log\",
                \"client_payload\": {
                  \"trace_id\": \"$TRACE\",
                  \"repo\": \"${GITHUB_REPOSITORY}\",
                  \"workflow\": \"engine-runner\",
                  \"status\": \"$STATUS\"
                }
              }"

          done

      - name: Commit normalized outputs
        run: |
          git config user.name "codex-engine"
          git config user.email "actions@github.com"

          git add outputs/signals-normalized/
          git commit -m "Engine normalized signals" || echo "No changes"

          git pull origin main --rebase || echo "No remote changes"
          git push origin main