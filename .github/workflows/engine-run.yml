name: AVOT Engine Runner

on:
  workflow_run:
    workflows: ["Archivist Ingest"]
    types:
      - completed

permissions:
  contents: write

jobs:
  run-engine:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Archivist repo
        uses: actions/checkout@v4

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.CODEX_APP_ID }}
          private-key: ${{ secrets.CODEX_APP_PRIVATE_KEY }}
          owner: sovereign-codex

      # 🔥 TRACE: engine start
      - name: Emit trace (engine start)
        run: |
          TRACE="engine_${{ github.run_id }}"

          curl -X POST https://api.github.com/repos/sovereign-codex/AVOT-TRACE/dispatches \
            -H "Authorization: Bearer ${{ steps.app-token.outputs.token }}" \
            -H "Accept: application/vnd.github+json" \
            -d "{
              \"event_type\": \"trace_log\",
              \"client_payload\": {
                \"trace_id\": \"$TRACE\",
                \"repo\": \"${{ github.repository }}\",
                \"workflow\": \"engine\",
                \"status\": \"started\"
              }
            }"

      - name: Ensure output directories
        run: |
          mkdir -p outputs/signals
          mkdir -p outputs/avot-core
          mkdir -p outputs/avot-research
          mkdir -p outputs/avot-guardian

      - name: Pull latest changes
        run: |
          git pull origin main --rebase || echo "No remote changes"

      - name: Process signals
        run: |
          echo "=== ENGINE START ==="

          shopt -s nullglob

          for file in processed/signals/*; do
            [ -f "$file" ] || continue

            case "$file" in
              *.json|*.JSON) ;;
              *) continue ;;
            esac

            filename=$(basename "$file")
            base="${filename%.*}"

            TYPE=$(jq -r '.type // "unknown"' "$file")
            TITLE=$(jq -r '.title // "Untitled"' "$file")
            SUMMARY=$(jq -r '.summary // "No summary"' "$file")
            PRIORITY=$(jq -r '.priority // "low"' "$file")

            # ✅ PRESERVE TRACE IF EXISTS
            TRACE=$(jq -r '.trace_id // empty' "$file")
            if [ -z "$TRACE" ]; then
              TRACE="trc_${base}"
            fi

            TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

            DEST="signals"

            if [ "$PRIORITY" = "high" ]; then
              DEST="AVOT-guardian"
            elif [ "$TYPE" = "research" ]; then
              DEST="AVOT-research"
            elif [ "$TYPE" = "signal" ]; then
              DEST="AVOT-engine-core-"
            fi

            OUTPUT_FILE="outputs/${DEST}/${base}.md"

            echo "Routing $base -> $DEST (trace: $TRACE)"

            echo "# AVOT Execution Output" > "$OUTPUT_FILE"
            echo "**Trace:** $TRACE" >> "$OUTPUT_FILE"

            # 🔥 TRACE PER SIGNAL
            curl -X POST https://api.github.com/repos/sovereign-codex/AVOT-TRACE/dispatches \
              -H "Authorization: Bearer ${{ steps.app-token.outputs.token }}" \
              -H "Accept: application/vnd.github+json" \
              -d "{
                \"event_type\": \"trace_log\",
                \"client_payload\": {
                  \"trace_id\": \"$TRACE\",
                  \"repo\": \"${{ github.repository }}\",
                  \"workflow\": \"engine\",
                  \"status\": \"routed:$DEST\"
                }
              }"

          done

      - name: Checkout Control Center repo
        uses: actions/checkout@v4
        with:
          repository: sovereign-codex/Codex-control-center
          token: ${{ steps.app-token.outputs.token }}
          path: control-center

      - name: Write handoff files into Control Center
        run: |
          mkdir -p control-center/queue/decisions

          shopt -s nullglob

          for file in processed/signals/*; do
            [ -f "$file" ] || continue

            filename=$(basename "$file")
            base="${filename%.*}"

            TYPE=$(jq -r '.type // "unknown"' "$file")
            PRIORITY=$(jq -r '.priority // "low"' "$file")

            TRACE=$(jq -r '.trace_id // empty' "$file")
            if [ -z "$TRACE" ]; then
              TRACE="trc_${base}"
            fi

            DEST="unknown"

            if [ "$PRIORITY" = "high" ]; then
              DEST="AVOT-guardian"
            elif [ "$TYPE" = "research" ]; then
              DEST="AVOT-research"
            elif [ "$TYPE" = "signal" ]; then
              DEST="AVOT-engine-core-"
            fi

            safe_name=$(echo "$base" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9._-]/-/g')

            handoff_file="control-center/queue/decisions/${safe_name}.json"

            jq -n \
              --arg trace_id "$TRACE" \
              --arg route "$DEST" \
              '{
                trace_id: $trace_id,
                decision: {
                  route: $route
                }
              }' > "$handoff_file"

            echo "Wrote $handoff_file"

            # 🔥 TRACE: decision created
            curl -X POST https://api.github.com/repos/sovereign-codex/AVOT-TRACE/dispatches \
              -H "Authorization: Bearer ${{ steps.app-token.outputs.token }}" \
              -H "Accept: application/vnd.github+json" \
              -d "{
                \"event_type\": \"trace_log\",
                \"client_payload\": {
                  \"trace_id\": \"$TRACE\",
                  \"repo\": \"control-center\",
                  \"workflow\": \"engine\",
                  \"status\": \"decision_created\"
                }
              }"

          done

      - name: Commit to Control Center
        run: |
          cd control-center

          git config user.name "codex-app"
          git config user.email "actions@github.com"

          git pull origin main --rebase || echo "No remote changes"

          git add queue/decisions/
          git commit -m "Engine decisions" || echo "No changes"

          git push origin main

      - name: Commit local outputs
        run: |
          git config user.name "codex-bot"
          git config user.email "actions@github.com"

          git add outputs/
          git commit -m "Engine run" || echo "No changes"

          git push origin main