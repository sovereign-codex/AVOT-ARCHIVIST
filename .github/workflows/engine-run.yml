name: AVOT Engine Runner

on:
  workflow_run:
    workflows: ["Archivist Ingest"]
    types:
      - completed

permissions:
  contents: write

jobs:
  run-engine:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Archivist repo
        uses: actions/checkout@v4

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.CODEX_APP_ID }}
          private-key: ${{ secrets.CODEX_APP_PRIVATE_KEY }}
          owner: sovereign-codex
          repositories: |
            AVOT-TRACE
            Codex-control-center

      - name: Emit trace (engine start)
        run: |
          TRACE="engine_${{ github.run_id }}"

          curl -s -X POST https://api.github.com/repos/sovereign-codex/AVOT-TRACE/dispatches \
            -H "Authorization: Bearer ${{ steps.app-token.outputs.token }}" \
            -H "Accept: application/vnd.github+json" \
            -d "{
              \"event_type\": \"trace_log\",
              \"client_payload\": {
                \"trace_id\": \"$TRACE\",
                \"repo\": \"${{ github.repository }}\",
                \"workflow\": \"engine\",
                \"status\": \"started\"
              }
            }"

      - name: Ensure output directories
        run: |
          mkdir -p outputs/avot-core
          mkdir -p outputs/archivist
          mkdir -p outputs/control-center

      - name: Process signals
        run: |
          echo "=== ENGINE START ==="
          shopt -s nullglob

          for file in processed/signals/*; do
            [ -f "$file" ] || continue

            case "$file" in
              *.json|*.JSON) ;;
              *) continue ;;
            esac

            filename=$(basename "$file")
            base="${filename%.*}"

            TYPE=$(jq -r '.type // "unknown"' "$file")
            PRIORITY=$(jq -r '.priority // "low"' "$file")

            TRACE=$(jq -r '.trace_id // empty' "$file")
            if [ -z "$TRACE" ]; then
              TRACE="trc_${base}"
            fi

            ROUTE="Codex-control-center"
            FS_DEST="control-center"

            if [ "$TYPE" = "signal" ]; then
              ROUTE="AVOT-engine-core-"
              FS_DEST="avot-core"
            elif [ "$TYPE" = "archival" ]; then
              ROUTE="AVOT-ARCHIVIST"
              FS_DEST="archivist"
            fi

            mkdir -p "outputs/${FS_DEST}"
            OUTPUT_FILE="outputs/${FS_DEST}/${base}.md"

            echo "Routing $base -> $ROUTE (trace: $TRACE)"

            echo "# AVOT Execution Output" > "$OUTPUT_FILE"
            echo "" >> "$OUTPUT_FILE"
            echo "**Trace:** $TRACE" >> "$OUTPUT_FILE"
            echo "**Source File:** $filename" >> "$OUTPUT_FILE"
            echo "**Route:** $ROUTE" >> "$OUTPUT_FILE"
            echo "**Type:** $TYPE" >> "$OUTPUT_FILE"
            echo "**Priority:** $PRIORITY" >> "$OUTPUT_FILE"

            curl -s -X POST https://api.github.com/repos/sovereign-codex/AVOT-TRACE/dispatches \
              -H "Authorization: Bearer ${{ steps.app-token.outputs.token }}" \
              -H "Accept: application/vnd.github+json" \
              -d "{
                \"event_type\": \"trace_log\",
                \"client_payload\": {
                  \"trace_id\": \"$TRACE\",
                  \"repo\": \"${{ github.repository }}\",
                  \"workflow\": \"engine\",
                  \"status\": \"routed:$ROUTE\"
                }
              }"
          done

      - name: Checkout Control Center
        uses: actions/checkout@v4
        with:
          repository: sovereign-codex/Codex-control-center
          token: ${{ steps.app-token.outputs.token }}
          path: control-center

      - name: Write decisions
        run: |
          mkdir -p control-center/queue/decisions

          shopt -s nullglob

          for file in processed/signals/*; do
            [ -f "$file" ] || continue

            case "$file" in
              *.json|*.JSON) ;;
              *) continue ;;
            esac

            filename=$(basename "$file")
            base="${filename%.*}"

            TYPE=$(jq -r '.type // "unknown"' "$file")

            TRACE=$(jq -r '.trace_id // empty' "$file")
            if [ -z "$TRACE" ]; then
              TRACE="trc_${base}"
            fi

            ROUTE="Codex-control-center"

            if [ "$TYPE" = "signal" ]; then
              ROUTE="AVOT-engine-core-"
            elif [ "$TYPE" = "archival" ]; then
              ROUTE="AVOT-ARCHIVIST"
            fi

            safe_name=$(echo "$base" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9._-]/-/g')

            jq -n \
              --arg trace_id "$TRACE" \
              --arg route "$ROUTE" \
              --arg source_repo "${{ github.repository }}" \
              --arg source_file "$filename" \
              '{
                trace_id: $trace_id,
                decision: {
                  route: $route
                },
                source: {
                  repo: $source_repo,
                  file: $source_file
                }
              }' > "control-center/queue/decisions/${safe_name}.json"

            curl -s -X POST https://api.github.com/repos/sovereign-codex/AVOT-TRACE/dispatches \
              -H "Authorization: Bearer ${{ steps.app-token.outputs.token }}" \
              -H "Accept: application/vnd.github+json" \
              -d "{
                \"event_type\": \"trace_log\",
                \"client_payload\": {
                  \"trace_id\": \"$TRACE\",
                  \"repo\": \"sovereign-codex/Codex-control-center\",
                  \"workflow\": \"engine\",
                  \"status\": \"decision_created\"
                }
              }"
          done

      - name: Commit decisions
        run: |
          cd control-center
          git config user.name "codex-app"
          git config user.email "actions@github.com"
          git pull origin main --rebase || echo "No remote changes"
          git add queue/decisions/
          git commit -m "Engine decisions" || echo "No changes"
          git push origin main

      - name: Trigger Dispatcher
        run: |
          curl -s -X POST https://api.github.com/repos/sovereign-codex/Codex-control-center/dispatches \
            -H "Authorization: Bearer ${{ steps.app-token.outputs.token }}" \
            -H "Accept: application/vnd.github+json" \
            -d '{
              "event_type": "engine_handoff"
            }'

      - name: Emit trace (dispatcher triggered)
        run: |
          TRACE="engine_${{ github.run_id }}"

          curl -s -X POST https://api.github.com/repos/sovereign-codex/AVOT-TRACE/dispatches \
            -H "Authorization: Bearer ${{ steps.app-token.outputs.token }}" \
            -H "Accept: application/vnd.github+json" \
            -d "{
              \"event_type\": \"trace_log\",
              \"client_payload\": {
                \"trace_id\": \"$TRACE\",
                \"repo\": \"sovereign-codex/Codex-control-center\",
                \"workflow\": \"engine\",
                \"status\": \"dispatcher_triggered\"
              }
            }"

      - name: Commit local outputs
        run: |
          git config user.name "codex-bot"
          git config user.email "actions@github.com"
          git pull origin main --rebase || echo "No remote changes"
          git add outputs/
          git commit -m "Engine run" || echo "No changes"
          git push origin main