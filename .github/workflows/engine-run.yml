name: AVOT Engine Runner

on:
  workflow_run:
    workflows: ["Archivist Ingest"]
    types:
      - completed

jobs:
  run-engine:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Ensure outputs directory exists
        run: mkdir -p outputs/signals

      - name: Process signals and generate outputs
        run: |
          echo "=== ENGINE EXECUTION START ==="

          for file in processed/signals/*.json; do
            if [ -f "$file" ]; then

              filename=$(basename "$file" .json)
              output="outputs/signals/$filename.md"

              echo "Processing: $file"

              TYPE=$(jq -r '.type' "$file")
              TITLE=$(jq -r '.title' "$file")
              SUMMARY=$(jq -r '.summary' "$file")
              PRIORITY=$(jq -r '.priority' "$file")

              TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

              cat <<'EOF' > "$output"
# AVOT Execution Output

**File:** FILENAME  
**Timestamp:** TIMESTAMP  

## Parsed Signal
- Type: TYPE
- Title: TITLE
- Summary: SUMMARY
- Priority: PRIORITY

## Engine Response
This signal has been received and interpreted by the AVOT Engine.

Next stage:
- Route to appropriate AVOT
- Execute domain-specific logic
- Produce actionable artifact

---
EOF

              # Replace placeholders safely (mobile-safe trick)
              sed -i "s/FILENAME/$filename/g" "$output"
              sed -i "s/TIMESTAMP/$TIMESTAMP/g" "$output"
              sed -i "s/TYPE/$TYPE/g" "$output"
              sed -i "s/TITLE/$TITLE/g" "$output"
              sed -i "s/SUMMARY/$SUMMARY/g" "$output"
              sed -i "s/PRIORITY/$PRIORITY/g" "$output"

            fi
          done

          echo "=== ENGINE EXECUTION END ==="

      - name: Commit outputs
        run: |
          git config user.name "codex-bot"
          git config user.email "actions@github.com"

          git add outputs/
          git commit -m "Engine processed signals into outputs" || echo "No changes"
          git push