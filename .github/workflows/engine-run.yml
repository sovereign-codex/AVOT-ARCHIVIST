name: AVOT Engine Runner

on:
  workflow_run:
    workflows: ["Archivist Ingest"]
    types:
      - completed

jobs:
  run-engine:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Ensure output directory exists
        run: mkdir -p outputs/signals

      - name: Process signals
        run: |
          echo "=== ENGINE START ==="

          for file in processed/signals/*.json; do
            if [ -f "$file" ]; then

              filename=$(basename "$file" .json)
              output="outputs/signals/$filename.md"

              TYPE=$(jq -r '.type' "$file")
              TITLE=$(jq -r '.title' "$file")
              SUMMARY=$(jq -r '.summary' "$file")
              PRIORITY=$(jq -r '.priority' "$file")
              TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

              echo "Writing output for $filename"

              echo "# AVOT Execution Output" > "$output"
              echo "" >> "$output"
              echo "**File:** $filename" >> "$output"
              echo "**Timestamp:** $TIMESTAMP" >> "$output"
              echo "" >> "$output"
              echo "## Parsed Signal" >> "$output"
              echo "- Type: $TYPE" >> "$output"
              echo "- Title: $TITLE" >> "$output"
              echo "- Summary: $SUMMARY" >> "$output"
              echo "- Priority: $PRIORITY" >> "$output"
              echo "" >> "$output"
              echo "## Engine Response" >> "$output"
              echo "This signal has been received and interpreted by the AVOT Engine." >> "$output"
              echo "" >> "$output"
              echo "Next stage:" >> "$output"
              echo "- Route to appropriate AVOT" >> "$output"
              echo "- Execute domain-specific logic" >> "$output"
              echo "- Produce actionable artifact" >> "$output"
              echo "---" >> "$output"

            fi
          done

          echo "=== ENGINE END ==="

      - name: Commit outputs
        run: |
          git config user.name "codex-bot"
          git config user.email "actions@github.com"

          git add outputs/
          git commit -m "Engine processed signals into outputs" || echo "No changes"
          git push