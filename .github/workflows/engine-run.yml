name: AVOT Engine Runner

on:
  push:
    paths:
      - 'processed/signals/*.json'

permissions:
  contents: write

jobs:
  run-engine:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Ensure output directories
        run: |
          mkdir -p outputs/signals
          mkdir -p outputs/avot-core
          mkdir -p outputs/avot-research
          mkdir -p outputs/avot-guardian

      - name: Process signals
        run: |
          echo "=== ENGINE C START ==="

          for file in processed/signals/*.json; do
            [ -e "$file" ] || continue

            filename=$(basename "$file" .json)
            output="outputs/signals/${filename}.md"

            TYPE=$(jq -r '.type' "$file")
            TITLE=$(jq -r '.title' "$file")
            SUMMARY=$(jq -r '.summary' "$file")
            PRIORITY=$(jq -r '.priority' "$file")

            TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

            echo "Processing: $filename"
            echo "Type: $TYPE | Priority: $PRIORITY"

            # --- DECISION ENGINE ---
            DEST="signals"
            RESPONSE="Queued for standard processing"

            if [ "$PRIORITY" = "high" ]; then
              DEST="avot-guardian"
              RESPONSE="Escalated to AVOT Guardian"
            elif [ "$TYPE" = "research" ]; then
              DEST="avot-research"
              RESPONSE="Routed to AVOT Research"
            elif [ "$TYPE" = "signal" ]; then
              DEST="avot-core"
              RESPONSE="Routed to AVOT Core"
            fi

            routed_output="outputs/${DEST}/${filename}.md"

            echo "Routing → $DEST"

            cat <<EOF > "$routed_output"
# AVOT Execution Output

**File:** $filename  
**Timestamp:** $TIMESTAMP  

---

## Parsed Signal

- Type: $TYPE  
- Title: $TITLE  
- Summary: $SUMMARY  
- Priority: $PRIORITY  

---

## Engine Decision

$RESPONSE

---

## Next Actions

- Routed to: $DEST
- Awaiting AVOT-specific execution layer

EOF

          done

      - name: Commit outputs
        run: |
          git config user.name "codex-bot"
          git config user.email "actions@github.com"

          git add outputs/

          git commit -m "Engine C processed signals" || echo "No changes to commit"

          git push