name: AVOT Engine Runner

on:
  push:
    paths:
      - 'processed/signals/*.json'

permissions:
  contents: write

jobs:
  run-engine:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Ensure output directories
        run: |
          mkdir -p outputs/signals
          mkdir -p outputs/avot-core
          mkdir -p outputs/avot-research
          mkdir -p outputs/avot-guardian

      - name: Process signals
        run: |
          echo "=== ENGINE C STABLE START ==="

          for file in processed/signals/*.json; do
            [ -e "$file" ] || continue

            filename=$(basename "$file" .json)

            TYPE=$(jq -r '.type' "$file")
            TITLE=$(jq -r '.title' "$file")
            SUMMARY=$(jq -r '.summary' "$file")
            PRIORITY=$(jq -r '.priority' "$file")

            TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

            DEST="signals"
            RESPONSE="Queued for standard processing"

            if [ "$PRIORITY" = "high" ]; then
              DEST="avot-guardian"
              RESPONSE="Escalated to AVOT Guardian"
            elif [ "$TYPE" = "research" ]; then
              DEST="avot-research"
              RESPONSE="Routed to AVOT Research"
            elif [ "$TYPE" = "signal" ]; then
              DEST="avot-core"
              RESPONSE="Routed to AVOT Core"
            fi

            OUTPUT_FILE="outputs/${DEST}/${filename}.md"

            echo "Routing $filename → $DEST"

            echo "# AVOT Execution Output" > "$OUTPUT_FILE"
            echo "" >> "$OUTPUT_FILE"
            echo "**File:** $filename" >> "$OUTPUT_FILE"
            echo "**Timestamp:** $TIMESTAMP" >> "$OUTPUT_FILE"
            echo "" >> "$OUTPUT_FILE"
            echo "## Parsed Signal" >> "$OUTPUT_FILE"
            echo "- Type: $TYPE" >> "$OUTPUT_FILE"
            echo "- Title: $TITLE" >> "$OUTPUT_FILE"
            echo "- Summary: $SUMMARY" >> "$OUTPUT_FILE"
            echo "- Priority: $PRIORITY" >> "$OUTPUT_FILE"
            echo "" >> "$OUTPUT_FILE"
            echo "## Engine Decision" >> "$OUTPUT_FILE"
            echo "$RESPONSE" >> "$OUTPUT_FILE"
            echo "" >> "$OUTPUT_FILE"
            echo "## Next Actions" >> "$OUTPUT_FILE"
            echo "- Routed to: $DEST" >> "$OUTPUT_FILE"
            echo "- Awaiting AVOT execution layer" >> "$OUTPUT_FILE"

          done

      - name: Commit outputs
        run: |
          git config user.name "codex-bot"
          git config user.email "actions@github.com"

          git add outputs/

          git commit -m "Engine C stable run" || echo "No changes"

          git push