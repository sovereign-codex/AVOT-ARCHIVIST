name: Archivist Ingest

on:
  push:
    paths:
      - "incoming/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------
      # 0. CHECKOUT (FULL HISTORY)
      # -----------------------------
      - name: Checkout repo (FULL)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -----------------------------
      # 1. CREATE GITHUB APP TOKEN
      # -----------------------------
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: sovereign-codex

      # -----------------------------
      # DEBUG VISIBILITY
      # -----------------------------
      - name: Debug repo state
        run: |
          echo "==== CURRENT COMMIT ===="
          git rev-parse HEAD

          echo "==== LAST COMMIT FILES ===="
          git show --name-only --pretty=""

          echo "==== INCOMING DIR ===="
          ls -la incoming || echo "incoming missing"

      # -----------------------------
      # 2. DETECT FILES (SMART)
      # -----------------------------
      - name: Detect changed incoming files
        id: files
        run: |
          echo "Detecting changed files..."

          FILES=$(git diff --name-only HEAD~1 HEAD | grep '^incoming/.*\.json$' || true)

          # fallback safety
          if [ -z "$FILES" ]; then
            echo "No git-detected changes, fallback scan..."
            FILES=$(ls incoming/*.json 2>/dev/null || true)
          fi

          echo "Detected files:"
          echo "$FILES"

          if [ -z "$FILES" ]; then
            echo "has_files=false" >> $GITHUB_OUTPUT
          else
            echo "has_files=true" >> $GITHUB_OUTPUT
            echo "files<<EOF" >> $GITHUB_OUTPUT
            echo "$FILES" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      # -----------------------------
      # 3. VALIDATE + NORMALIZE
      # -----------------------------
      - name: Validate + Normalize events
        if: steps.files.outputs.has_files == 'true'
        run: |
          mkdir -p processed

          for file in ${{ steps.files.outputs.files }}; do
            echo "---- Processing $file ----"

            TRACE_ID=$(jq -r '.trace_id // empty' "$file")
            WORKFLOW=$(jq -r '.workflow // empty' "$file")
            REPO=$(jq -r '.repo // empty' "$file")
            STATUS=$(jq -r '.status // "unknown"' "$file")
            TIMESTAMP=$(jq -r '.timestamp // empty' "$file")

            # TIMESTAMP FIX
            if [ -z "$TIMESTAMP" ] || [ "$TIMESTAMP" = "null" ]; then
              TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
              echo "⚠️ Missing timestamp → using system time"
            fi

            # HARD VALIDATION
            if [ -z "$TRACE_ID" ] || [ -z "$WORKFLOW" ] || [ -z "$REPO" ]; then
              echo "❌ Invalid event → skipping $file"
              continue
            fi

            # Normalize event
            jq -n \
              --arg trace_id "$TRACE_ID" \
              --arg workflow "$WORKFLOW" \
              --arg repo "$REPO" \
              --arg status "$STATUS" \
              --arg timestamp "$TIMESTAMP" \
              '{
                trace_id: $trace_id,
                workflow: $workflow,
                repo: $repo,
                status: $status,
                timestamp: $timestamp
              }' > "processed/$(basename "$file")"

          done

      # -----------------------------
      # 4. TRACE STORAGE
      # -----------------------------
      - name: Update trace storage
        if: steps.files.outputs.has_files == 'true'
        run: |
          mkdir -p traces

          for file in processed/*.json; do
            [ -f "$file" ] || continue

            TRACE_ID=$(jq -r '.trace_id' "$file")
            TRACE_FILE="traces/${TRACE_ID}.json"

            # Initialize if missing
            if [ ! -f "$TRACE_FILE" ]; then
              echo "{\"trace_id\":\"$TRACE_ID\",\"events\":[]}" > "$TRACE_FILE"
            fi

            # Append safely
            jq --slurpfile new "$file" \
              '.events += $new' \
              "$TRACE_FILE" > tmp.json && mv tmp.json "$TRACE_FILE"

          done

      # -----------------------------
      # 5. DISPATCH (FULLY FIXED)
      # -----------------------------
      - name: Dispatch events via Cross Repo Dispatcher
        if: steps.files.outputs.has_files == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          for file in processed/*.json; do
            [ -f "$file" ] || continue

            echo "🚀 Routing via dispatcher: $(basename "$file")"

            PAYLOAD=$(jq -c . "$file")

            BODY=$(jq -n \
              --argjson event "$PAYLOAD" \
              '{
                event_type: "route-event",
                client_payload: {
                  target: "control-center",
                  source: "archivist",
                  event: $event
                }
              }')

            echo "Dispatch body:"
            echo "$BODY"

            RESPONSE=$(curl -s -o response.txt -w "%{http_code}" \
              -X POST \
              https://api.github.com/repos/sovereign-codex/Codex-control-center/dispatches \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -d "$BODY")

            echo "HTTP Status: $RESPONSE"
            echo "Response:"
            cat response.txt
          done

      # -----------------------------
      # 6. COMMIT (SAFE)
      # -----------------------------
      - name: Commit changes
        if: steps.files.outputs.has_files == 'true'
        run: |
          git config user.name "codex-bot"
          git config user.email "actions@github.com"

          git add processed traces

          git commit -m "Archivist ingest: normalized, stored, dispatched" || echo "No changes"

          git pull --rebase origin main || true
          git push