name: Archivist Ingest

on:
  push:
    paths:
      - "incoming/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------
      # 0. CHECKOUT (FIXED)
      # -----------------------------
      - name: Checkout repo (FULL)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -----------------------------
      # DEBUG (CRITICAL VISIBILITY)
      # -----------------------------
      - name: Debug repo state
        run: |
          echo "==== CURRENT COMMIT ===="
          git rev-parse HEAD

          echo "==== LAST COMMIT FILES ===="
          git show --name-only --pretty=""

          echo "==== INCOMING DIR ===="
          ls -la incoming || echo "incoming missing"

      # -----------------------------
      # 1. DISCOVER FILES (SMART)
      # -----------------------------
      - name: Detect changed incoming files
        id: files
        run: |
          echo "Detecting changed files..."

          FILES=$(git diff --name-only HEAD~1 HEAD | grep '^incoming/.*\.json$' || true)

          # fallback (important)
          if [ -z "$FILES" ]; then
            echo "No git-detected changes, fallback scan..."
            FILES=$(ls incoming/*.json 2>/dev/null || true)
          fi

          echo "Detected files:"
          echo "$FILES"

          if [ -z "$FILES" ]; then
            echo "has_files=false" >> $GITHUB_OUTPUT
          else
            echo "has_files=true" >> $GITHUB_OUTPUT
            echo "files<<EOF" >> $GITHUB_OUTPUT
            echo "$FILES" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      # -----------------------------
      # 2. VALIDATE + NORMALIZE
      # -----------------------------
      - name: Validate + Normalize events
        if: steps.files.outputs.has_files == 'true'
        run: |
          mkdir -p processed

          for file in ${{ steps.files.outputs.files }}; do
            echo "---- Processing $file ----"

            TRACE_ID=$(jq -r '.trace_id // empty' "$file")
            WORKFLOW=$(jq -r '.workflow // empty' "$file")
            REPO=$(jq -r '.repo // empty' "$file")
            STATUS=$(jq -r '.status // "unknown"' "$file")
            TIMESTAMP=$(jq -r '.timestamp // empty' "$file")

            # TIMESTAMP FIX (CRITICAL)
            if [ -z "$TIMESTAMP" ] || [ "$TIMESTAMP" = "null" ]; then
              TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
              echo "⚠️ Missing timestamp → using system time"
            fi

            # VALIDATION (HARD GATE)
            if [ -z "$TRACE_ID" ] || [ -z "$WORKFLOW" ] || [ -z "$REPO" ]; then
              echo "❌ Invalid event → skipping $file"
              continue
            fi

            jq -n \
              --arg trace_id "$TRACE_ID" \
              --arg workflow "$WORKFLOW" \
              --arg repo "$REPO" \
              --arg status "$STATUS" \
              --arg timestamp "$TIMESTAMP" \
              '{
                trace_id: $trace_id,
                workflow: $workflow,
                repo: $repo,
                status: $status,
                timestamp: $timestamp
              }' > "processed/$(basename $file)"

          done

      # -----------------------------
      # 3. TRACE STORAGE (SAFE)
      # -----------------------------
      - name: Update trace storage
        if: steps.files.outputs.has_files == 'true'
        run: |
          mkdir -p traces

          for file in processed/*.json; do
            [ -f "$file" ] || continue

            TRACE_ID=$(jq -r '.trace_id' "$file")
            TRACE_FILE="traces/${TRACE_ID}.json"

            # INIT IF NEEDED
            if [ ! -f "$TRACE_FILE" ]; then
              echo "{\"trace_id\":\"$TRACE_ID\",\"events\":[]}" > "$TRACE_FILE"
            fi

            # APPEND EVENT SAFELY
            jq --slurpfile new "$file" \
              '.events += $new' \
              "$TRACE_FILE" > tmp.json && mv tmp.json "$TRACE_FILE"

          done

      # -----------------------------
      # 4. DISPATCH (FIXED + DEBUG)
      # -----------------------------
      - name: Dispatch events to Control Center
        if: steps.files.outputs.has_files == 'true'
        run: |
          for file in processed/*.json; do
            [ -f "$file" ] || continue

            echo "🚀 Dispatching $(basename $file)"
            cat "$file"

            RESPONSE=$(curl -s -o response.txt -w "%{http_code}" \
              -X POST https://api.github.com/repos/sovereign-codex/Codex-control-center/dispatches \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -d "{
                \"event_type\": \"trace-event\",
                \"client_payload\": $(cat $file)
              }")

            echo "HTTP Status: $RESPONSE"
            echo "Response:"
            cat response.txt
          done

      # -----------------------------
      # 5. COMMIT (SAFE PUSH)
      # -----------------------------
      - name: Commit changes
        if: steps.files.outputs.has_files == 'true'
        run: |
          git config user.name "codex-bot"
          git config user.email "actions@github.com"

          git add processed traces

          git commit -m "Archivist ingest: normalized, stored, dispatched" || echo "No changes"

          git pull --rebase origin main || true
          git push