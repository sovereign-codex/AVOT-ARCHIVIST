name: Archivist Ingest

on:
  push:
    paths:
      - "incoming/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # -----------------------------
      # 1. DISCOVER FILES
      # -----------------------------
      - name: Find incoming files
        id: files
        run: |
          FILES=$(ls incoming/*.json 2>/dev/null || true)

          if [ -z "$FILES" ]; then
            echo "No incoming files"
            echo "has_files=false" >> $GITHUB_OUTPUT
          else
            echo "has_files=true" >> $GITHUB_OUTPUT
            echo "files<<EOF" >> $GITHUB_OUTPUT
            echo "$FILES" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      # -----------------------------
      # 2. VALIDATE + NORMALIZE
      # -----------------------------
      - name: Validate + Normalize events
        if: steps.files.outputs.has_files == 'true'
        run: |
          mkdir -p processed

          for file in ${{ steps.files.outputs.files }}; do
            echo "---- Processing $file ----"

            # Extract fields safely
            TRACE_ID=$(jq -r '.trace_id // empty' "$file")
            WORKFLOW=$(jq -r '.workflow // empty' "$file")
            REPO=$(jq -r '.repo // empty' "$file")
            STATUS=$(jq -r '.status // "unknown"' "$file")
            TIMESTAMP=$(jq -r '.timestamp // empty' "$file")

            # Fallback timestamp (CRITICAL FIX)
            if [ -z "$TIMESTAMP" ] || [ "$TIMESTAMP" = "null" ]; then
              TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
              echo "⚠️ Missing timestamp → using system time"
            fi

            # VALIDATION (hard gate)
            if [ -z "$TRACE_ID" ] || [ -z "$WORKFLOW" ] || [ -z "$REPO" ]; then
              echo "❌ Invalid event → skipping $file"
              continue
            fi

            # Normalize event
            jq -n \
              --arg trace_id "$TRACE_ID" \
              --arg workflow "$WORKFLOW" \
              --arg repo "$REPO" \
              --arg status "$STATUS" \
              --arg timestamp "$TIMESTAMP" \
              '{
                trace_id: $trace_id,
                workflow: $workflow,
                repo: $repo,
                status: $status,
                timestamp: $timestamp
              }' > "processed/$(basename $file)"

          done

      # -----------------------------
      # 3. STORE (TRACE FILES)
      # -----------------------------
      - name: Update trace storage
        if: steps.files.outputs.has_files == 'true'
        run: |
          mkdir -p traces

          for file in processed/*.json; do
            [ -f "$file" ] || continue

            TRACE_ID=$(jq -r '.trace_id' "$file")
            TRACE_FILE="traces/${TRACE_ID}.json"

            # Initialize if not exists
            if [ ! -f "$TRACE_FILE" ]; then
              echo "{\"trace_id\":\"$TRACE_ID\",\"events\":[]}" > "$TRACE_FILE"
            fi

            # Append event
            jq --slurpfile new "$file" \
              '.events += $new' \
              "$TRACE_FILE" > tmp.json && mv tmp.json "$TRACE_FILE"

          done

      # -----------------------------
      # 4. DISPATCH (CRITICAL LAYER)
      # -----------------------------
      - name: Dispatch events to Control Center
        if: steps.files.outputs.has_files == 'true'
        run: |
          for file in processed/*.json; do
            [ -f "$file" ] || continue

            echo "🚀 Dispatching $(basename $file)"

            curl -X POST https://api.github.com/repos/sovereign-codex/Codex-control-center/dispatches \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -d "{
                \"event_type\": \"trace-event\",
                \"client_payload\": $(cat $file)
              }"
          done

      # -----------------------------
      # 5. COMMIT EVERYTHING
      # -----------------------------
      - name: Commit changes
        if: steps.files.outputs.has_files == 'true'
        run: |
          git config user.name "codex-bot"
          git config user.email "actions@github.com"

          git add processed traces

          git commit -m "Archivist ingest: normalized, stored, dispatched" || echo "No changes"
          git push