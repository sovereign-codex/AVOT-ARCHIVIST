name: Archivist Ingest

on:
  push:
    paths:
      - "incoming/**"
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Log incoming files
        run: |
          echo "Incoming files:"
          ls -R incoming || echo "No incoming files"

      - name: Copy files to processed
        run: |
          mkdir -p processed
          cp -r incoming/* processed/ 2>/dev/null || echo "Nothing to copy"

      - name: Commit processed files
        run: |
          git config user.name "codex-bot"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Processed incoming files" || echo "No changes"
          git push